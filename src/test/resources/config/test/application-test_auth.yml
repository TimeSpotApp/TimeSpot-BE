app:
  cors:
    allowed-origins:
      - http://localhost:5173
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - Authorization
  jwt:
    issuer: NomadSpot
    access-token-secret: 
    refresh-token-secret: 
    access-token-expiration-seconds: 604800  # 7 days
    refresh-token-expiration-seconds: 1209600  # 2 weeks