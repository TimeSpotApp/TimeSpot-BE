name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
#    tags:
#      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  DEFAULT_BUILD_JAVA_VERSION: '17'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.DEFAULT_BUILD_JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Run Tests
        run: ./gradlew test --no-daemon

